server {
    server_name envhealth.cn www.envhealth.cn;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:6425;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/envhealth.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/envhealth.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.envhealth.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = envhealth.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name envhealth.cn www.envhealth.cn;
    return 404; # managed by Certbot
}
